services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ledger:ledger@postgres:5432/ledger_db}
      LEDGER_REPOSITORY_BACKEND: ${LEDGER_REPOSITORY_BACKEND:-database}
      APP_ENV: ${APP_ENV:-development}
      IDEMPOTENCY_SECRET: ${IDEMPOTENCY_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ledger:ledger@postgres:5432/ledger_db}
      LEDGER_REPOSITORY_BACKEND: ${LEDGER_REPOSITORY_BACKEND:-database}
      APP_ENV: ${APP_ENV:-development}
      IDEMPOTENCY_SECRET: ${IDEMPOTENCY_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "alembic", "upgrade", "head"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
